name: Analisis Cuantitativo Excel

on:
  schedule:
    # Se ejecuta automáticamente cada 20 minutos
    - cron: '*/20 * * * *'
  push:
    paths:
      - '**.xlsx'  # Se ejecuta automáticamente al subir o modificar un Excel
  workflow_dispatch:  # Permite ejecutarlo manualmente con el botón "Run workflow"

jobs:
  analizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl requests thefuzz python-Levenshtein

      - name: Ejecutar Análisis de Excel
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_excel.py

      - name: Guardar Historial de Alertas
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          if [ -f alertas_enviadas.txt ]; then
            git add alertas_enviadas.txt
            git commit -m "Auto-update: guardar historial de alertas enviadas" || echo "Sin cambios para guardar"
            git push
          fi
